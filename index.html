<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F6F1E9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Codyapp">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐱</text></svg>">
<title>Codyapp — Cody 的照護日誌</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    /* 規格語意 token（莫蘭迪暖大地色 + 鼠尾草綠） */
    --bg:#F6F1E9; --card:#FFFEFB; --text:#3D3833; --text2:#8C8378; --muted:#B3AA9E;
    --border:#EAE3D9;
    --accent:#8B9E7E; --accent-bg:#E9EEE3; --accent-text:#566B4A;
    --warn:#C79A4A; --warn-bg:#F4ECD7; --warn-text:#846420;
    --danger:#B5654D; --danger-bg:#F1E1D9; --danger-text:#7E4130;
    --ok:#7E9B76; --ok-bg:#E6ECE0; --ok-text:#4F6248;
    --radius:16px; --radius-sm:10px;
    /* 相容別名：JS 模板與舊規則沿用的變數名，一律指向上面的新色 */
    --ink:var(--text); --ink2:var(--text2); --line:var(--border);
    --brand:var(--accent); --brand-soft:var(--accent-bg);
    --green:var(--ok); --green-soft:var(--ok-bg);
    --yellow:var(--warn); --yellow-soft:var(--warn-bg);
    --red:var(--danger); --red-soft:var(--danger-bg);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  html{background:var(--bg);}   /* iOS 橡皮筋回彈不露白底 */
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    font-size:16px; line-height:1.55; font-weight:400;
    -webkit-font-smoothing:antialiased;
    min-height:100svh;
    padding-top:env(safe-area-inset-top);
    padding-bottom:calc(72px + env(safe-area-inset-bottom));
  }
  main{max-width:440px;margin:0 auto;padding:16px 16px 24px;}
  h1,h2,h3{margin:0;font-weight:500;}
  /* 區塊標題：低調小標，如參考稿的 .label */
  h2{font-size:13px;font-weight:400;color:var(--text2);margin:20px 4px 8px;display:flex;align-items:center;gap:6px;}
  .muted{color:var(--text2);font-size:13px;}
  .card{background:var(--card);border-radius:var(--radius);padding:16px;
        border:0.5px solid var(--border);}
  button{font-family:inherit;border:none;cursor:pointer;}
  button:active{transform:scale(0.98);}
  input,select,textarea{
    font-family:inherit;font-size:16px;color:var(--text);
    border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;
    background:var(--card);width:100%;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg);}
  label.f{display:block;margin:12px 0 4px;font-size:13px;color:var(--text2);font-weight:400;}

  /* ---------- top pet header ---------- */
  .pet-top{display:flex;align-items:center;gap:14px;}
  .avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;background:var(--accent-bg);
          display:flex;align-items:center;justify-content:center;font-size:28px;flex:0 0 56px;overflow:hidden;}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .pet-top .name{font-size:18px;font-weight:500;}
  .pet-top .sub{font-size:13px;color:var(--text2);margin-top:2px;}
  .pet-top .wlabel{font-size:13px;color:var(--text2);}
  .pet-top .kg{font-size:20px;font-weight:500;margin-top:2px;}
  .pet-top .kg small{font-size:13px;color:var(--text2);font-weight:400;}
  .health-banner{display:flex;align-items:center;gap:6px;margin-top:14px;padding:9px 12px;
                 border-radius:var(--radius-sm);font-size:13px;}
  .health-banner.good{background:var(--ok-bg);color:var(--ok-text);}
  .health-banner.bad{background:var(--warn-bg);color:var(--warn-text);}

  /* ---------- care cards ---------- */
  .care-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .care-card{border-radius:14px;padding:12px;border:0.5px solid var(--border);background:var(--card);text-align:left;}
  .care-card .t{font-size:13px;font-weight:400;color:var(--text);}
  .care-card .d{font-size:12px;color:var(--text2);margin-top:6px;}
  .care-card.warn{border-color:var(--warn);}
  .care-card.warn .d{color:var(--warn-text);}
  .care-card.due{border-color:var(--danger);}
  .care-card.due .d{color:var(--danger-text);}

  /* ---------- quick buttons（低調描邊） ---------- */
  .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .quick-btn,.quick-sub .quick-btn{border-radius:var(--radius-sm);padding:14px;min-height:48px;font-size:14px;font-weight:400;
             background:var(--card);color:var(--text);border:0.5px solid var(--border);
             display:flex;align-items:center;justify-content:center;gap:6px;}
  .quick-btn .ic{font-size:18px;}
  .quick-sub{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}

  /* ---------- recent feeding rows ---------- */
  .feed-row{display:flex;justify-content:space-between;align-items:center;gap:10px;
            padding:11px 0 9px;border-bottom:0.5px solid var(--border);}
  .feed-row:last-child{border-bottom:none;padding-bottom:0;}
  .feed-row .fn{font-size:13px;display:flex;align-items:center;gap:6px;}
  .feed-row .fm{font-size:11px;color:var(--muted);margin-top:2px;}
  .pill{font-size:11px;padding:3px 10px;border-radius:20px;flex:0 0 auto;white-space:nowrap;}
  .pill.ok{background:var(--ok-bg);color:var(--ok-text);}
  .pill.warn{background:var(--warn-bg);color:var(--warn-text);}
  .pill.danger{background:var(--danger-bg);color:var(--danger-text);}

  /* ---------- summary chips (mini list) ---------- */
  .mini-list{display:flex;flex-direction:column;gap:8px;}
  .mini-item{display:flex;justify-content:space-between;align-items:center;gap:8px;
             background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:10px 12px;font-size:14px;}
  .mini-item .when{color:var(--text2);font-size:12px;flex:0 0 auto;}
  .tag{display:inline-block;font-size:11px;font-weight:400;border-radius:999px;padding:2px 9px;
       background:var(--accent-bg);color:var(--accent-text);margin-right:6px;}
  .tag.sym{background:var(--danger-bg);color:var(--danger-text);}
  .tag.care{background:var(--ok-bg);color:var(--ok-text);}
  .tag.med{background:#ECE5DB;color:var(--text2);}
  .tag.wt{background:#ECE5DB;color:var(--text2);}
  .tag.treat{background:var(--warn-bg);color:var(--warn-text);}

  /* ---------- chips (selectable) ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{border-radius:999px;border:0.5px solid var(--border);background:var(--card);color:var(--text);
        padding:9px 14px;font-size:14px;font-weight:400;}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .chip.big{padding:12px 16px;font-size:15px;}

  /* ---------- modal ---------- */
  .modal-back{position:fixed;inset:0;background:rgba(61,56,51,.42);display:none;z-index:50;
              align-items:flex-end;justify-content:center;}
  .modal-back.show{display:flex;}
  .modal{background:var(--bg);width:100%;max-width:440px;max-height:88vh;overflow-y:auto;
         border-radius:20px 20px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));}
  .modal h3{font-size:17px;font-weight:500;display:flex;justify-content:space-between;align-items:center;}
  .modal .x{background:none;font-size:22px;color:var(--text2);padding:4px 8px;}
  .btn{display:block;width:100%;border-radius:var(--radius-sm);padding:14px;font-size:16px;font-weight:500;
       background:var(--accent);color:#fff;margin-top:18px;min-height:48px;}
  .btn.sec{background:var(--card);color:var(--text);border:0.5px solid var(--border);font-weight:400;}
  .btn.danger{background:var(--danger);color:#fff;}
  .btn.small{padding:11px 12px;font-size:14px;margin-top:8px;min-height:0;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  /* ---------- bottom nav ---------- */
  nav.tabs{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:0.5px solid var(--border);
           display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom);}
  nav.tabs button{flex:1;background:none;padding:9px 0 7px;font-size:11px;color:var(--text2);
                  display:flex;flex-direction:column;align-items:center;gap:1px;font-weight:400;}
  nav.tabs button .ic{font-size:21px;}
  nav.tabs button.on{color:var(--accent-text);}

  /* ---------- history ---------- */
  .filter-bar{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch;}
  .filter-bar .chip{flex:0 0 auto;}
  .h-item{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:11px 12px;margin-bottom:8px;
          display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .h-item .del{background:none;color:var(--muted);font-size:16px;padding:2px 4px;flex:0 0 auto;}
  .h-main{font-size:14px;}
  .h-sub{font-size:12px;color:var(--text2);margin-top:3px;white-space:pre-wrap;}

  /* ---------- vet mode ---------- */
  .vet-sec{margin-bottom:12px;}
  .vet-sec h3{font-size:14px;font-weight:500;margin-bottom:8px;color:var(--accent-text);}
  .vet-line{font-size:14px;padding:6px 0;border-bottom:0.5px dashed var(--border);display:flex;gap:8px;}
  .vet-line .d{color:var(--text2);font-size:12px;flex:0 0 74px;}
  .sev{font-size:11px;font-weight:400;border-radius:6px;padding:1px 7px;}
  .sev.mild{background:var(--ok-bg);color:var(--ok-text);}
  .sev.mid{background:var(--warn-bg);color:var(--warn-text);}
  .sev.severe{background:var(--danger-bg);color:var(--danger-text);}

  .chart-box{position:relative;height:150px;}
  .lab-chart{position:relative;height:150px;margin-top:8px;}

  .empty{padding:20px;text-align:center;color:var(--text2);font-size:14px;}
  .ok-banner{background:var(--ok-bg);border:0.5px solid var(--border);color:var(--ok-text);
             border-radius:var(--radius-sm);padding:12px;text-align:center;font-weight:400;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(84px + env(safe-area-inset-bottom));
         background:var(--text);color:#fff;border-radius:999px;padding:9px 18px;font-size:14px;z-index:60;
         opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:.96;}
  .lib-grid{display:flex;flex-wrap:wrap;gap:8px;max-height:180px;overflow-y:auto;}

  /* ---------- 今日檢查 ---------- */
  .dc-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .dc-item{display:flex;flex-direction:column;gap:4px;}
  .dc-check{border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--card);padding:11px 4px;
            display:flex;flex-direction:column;align-items:center;gap:3px;
            font-size:13px;font-weight:400;color:var(--text2);min-height:48px;}
  .dc-check .em{font-size:22px;}
  .dc-check.on{background:var(--ok-bg);border-color:var(--ok);color:var(--ok-text);}
  .dc-warn{background:none;color:var(--danger);font-size:12px;font-weight:400;padding:3px;}

  /* ---------- 產品看圖快選 ---------- */
  .prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-height:280px;overflow-y:auto;}
  .prod-card{border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--card);padding:6px;
             display:flex;flex-direction:column;align-items:center;gap:4px;
             font-size:12px;font-weight:400;color:var(--text);}
  .prod-card img,.prod-noimg{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;}
  .prod-noimg{display:flex;align-items:center;justify-content:center;font-size:30px;background:var(--bg);}
  .prod-card.on{border-color:var(--accent);background:var(--accent-bg);}
  .prod-card span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
  .mini-thumb{width:26px;height:26px;border-radius:6px;object-fit:cover;vertical-align:-8px;margin-right:6px;}
  .ep-photo{margin:4px 0 8px;}
  .ep-photo img{width:140px;height:140px;object-fit:cover;border-radius:12px;border:0.5px solid var(--border);}

  /* ---------- 相簿 ---------- */
  .album-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .album-thumb{aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:var(--accent-bg);border:none;padding:0;font-size:26px;}
  .album-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .kv-row{display:grid;grid-template-columns:1fr 1fr 34px;gap:8px;margin-top:8px;align-items:center;}
  .kv-row button{background:none;color:var(--danger);font-size:18px;}
  .care-def-row{display:grid;grid-template-columns:1fr 84px 34px;gap:8px;margin-top:8px;align-items:center;}
  details{margin-top:10px;}
  details summary{font-size:14px;font-weight:500;color:var(--accent-text);cursor:pointer;}
  .set-block{margin-bottom:14px;}
  .sync-status{font-size:13px;margin-top:8px;}
  .sync-status.ok{color:var(--ok-text);} .sync-status.err{color:var(--danger-text);}
  .countdown-card{display:flex;align-items:center;gap:12px;}
  .countdown-card .num{font-size:24px;font-weight:500;color:var(--accent-text);}

  @media print{
    body{padding:0;background:#fff;}
    nav.tabs, .no-print{display:none !important;}
  }
</style>
</head>
<body>

<main id="app"></main>

<nav class="tabs no-print" id="tabs">
  <button data-v="home"><span class="ic">🏠</span>首頁</button>
  <button data-v="history"><span class="ic">📋</span>紀錄</button>
  <button data-v="vet"><span class="ic">🩺</span>看診</button>
  <button data-v="album"><span class="ic">📷</span>相簿</button>
  <button data-v="settings"><span class="ic">⚙️</span>設定</button>
</nav>

<div class="modal-back" id="modalBack"><div class="modal" id="modalBox"></div></div>
<div class="toast" id="toast"></div>

<script>
'use strict';
/* =====================================================================
   Codyapp v1 — Cody 的電子病歷本 + 照護儀表板
   單一 HTML 檔、vanilla JS、localStorage + Google Drive 同步
===================================================================== */

// ---------------------------------------------------------------- consts
const LS_KEY = 'codyapp-data';
const LS_DEVICE = 'codyapp-device';   // 裝置層設定：記錄者、Drive clientId/folderId
const DATA_FILENAME = 'cody-data.json';
// 預設同步目標（Jerry 的共用資料夾），兩人手機免手動輸入；設定頁可覆蓋
const DEFAULT_FOLDER_ID = '1rDVV4VHMutdH6p2C5FdP6avMuh8d8cw_';
const DEFAULT_CLIENT_ID = '900627207011-6t50bvo8p37lsbmldoggknumrhkvckfs.apps.googleusercontent.com';

const RATINGS = { ate_all:'😻 吃光', half:'😐 剩一半', refused:'🙈 聞了就走' };
const PROTEINS = ['雞','魚','牛','鴨','羊','混合'];
const SYMPTOM_TYPES = { vomit:'嘔吐', soft_stool:'軟便', diarrhea:'拉肚子', no_appetite:'拒食', urine:'排尿異常', itchy:'皮膚搔癢', other:'其他' };
const VOMIT_CONTENTS = { hairball:'毛球', undigested:'未消化食物', yellow:'黃水', foam:'白沫', other:'其他' };
const URINE_CONTENTS = { frequent:'頻尿', little:'尿量少', blood:'血尿', outside:'亂尿在外', other:'其他' };
const DAILY_ITEMS = [
  { key:'food', emoji:'🍚', label:'飼料吃光', warnType:'no_appetite' },
  { key:'pee',  emoji:'💧', label:'有尿尿',   warnType:'urine' },
  { key:'poop', emoji:'💩', label:'有大便',   warnType:'diarrhea' }
];
const SEVERITIES = { mild:'輕', mid:'中', severe:'重' };
const USERS = ['Jerry','Phoebe'];

// ---------------------------------------------------------------- utils
const $ = s => document.querySelector(s);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const nowISO = () => new Date().toISOString();
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const alive = arr => (arr || []).filter(x => !x.deleted);

function fmtDT(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('zh-TW', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false});
}
function fmtDate(s){
  if(!s) return '';
  const d = new Date(s);
  return d.toLocaleDateString('zh-TW', {year:'numeric', month:'numeric', day:'numeric'});
}
function fmtShortDate(s){
  const d = new Date(s);
  return d.toLocaleDateString('zh-TW', {month:'numeric', day:'numeric'});
}
function daysSince(iso){
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}
function daysUntil(dateStr){
  const t = new Date(dateStr); t.setHours(0,0,0,0);
  const n = new Date(); n.setHours(0,0,0,0);
  return Math.round((t - n) / 86400000);
}
function ageString(birth){
  const b = new Date(birth), n = new Date();
  let months = (n.getFullYear() - b.getFullYear()) * 12 + (n.getMonth() - b.getMonth());
  if(n.getDate() < b.getDate()) months--;
  if(months < 0) months = 0;
  return `${Math.floor(months / 12)} 歲 ${months % 12} 個月`;
}
function localInputNow(){
  const d = new Date(), p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function todayInput(){
  const d = new Date(), p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tm);
  t._tm = setTimeout(() => t.classList.remove('show'), 2200);
}

// ---------------------------------------------------------------- data layer
function defaultData(){
  return {
    metadata: { version:'1.0', lastSync:'' },
    petInfo: { name:'Cody', birthDate:'2024-02-26', breed:'美國短毛貓', photoUrl:'', updatedAt:'' },
    mainFood: { brand:'', flavor:'', mealsPerDay:6, updatedAt:'', history:[] },
    productLibrary: [],
    feedings: [],
    symptoms: [],
    careTasks: {
      definitions: [
        { id:'nail',   name:'剪指甲', cycleDays:7,  updatedAt:'' },
        { id:'ear',    name:'洗耳朵', cycleDays:7,  updatedAt:'' },
        { id:'teeth',  name:'刷牙',   cycleDays:3,  updatedAt:'' },
        { id:'deworm', name:'驅蟲藥', cycleDays:30, updatedAt:'' }
      ],
      logs: []
    },
    medical: [],
    weights: [],
    dailyChecks: []
  };
}

let data = loadData();
let device = loadDevice();
let currentView = 'home';
let charts = [];

function loadData(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return defaultData();
    const d = JSON.parse(raw);
    return mergeData(defaultData(), d);   // 補齊缺欄位並保留資料
  }catch(e){
    console.error('讀取 localStorage 失敗', e);
    return defaultData();
  }
}
function loadDevice(){
  let d;
  try{ d = JSON.parse(localStorage.getItem(LS_DEVICE)) || {}; }
  catch(e){ d = {}; }
  if(!d.folderId && DEFAULT_FOLDER_ID) d.folderId = DEFAULT_FOLDER_ID;
  if(!d.clientId && DEFAULT_CLIENT_ID) d.clientId = DEFAULT_CLIENT_ID;
  return d;
}
function saveDevice(){ localStorage.setItem(LS_DEVICE, JSON.stringify(device)); }

function saveData(opts = {}){
  localStorage.setItem(LS_KEY, JSON.stringify(data));
  if(opts.rerender !== false) render();
  if(opts.sync !== false) scheduleSync();
}

// 追加式合併：陣列以 id 去重、取 updatedAt/timestamp 較新者；物件取 updatedAt 較新者
function mergeById(a = [], b = []){
  const stamp = x => x.updatedAt || x.timestamp || x.changedAt || x.date || '';
  const m = new Map();
  for(const item of [...a, ...b]){
    if(!item || !item.id) continue;
    const prev = m.get(item.id);
    if(!prev || stamp(item) >= stamp(prev)) m.set(item.id, item);
  }
  return [...m.values()];
}
function newerObj(a, b){
  if(!b) return a;
  if(!a) return b;
  return (b.updatedAt || '') > (a.updatedAt || '') ? b : a;
}
function mergeData(base, incoming){
  const d = defaultData();
  const a = base || d, b = incoming || {};
  const out = {};
  out.metadata = { version:'1.0',
    lastSync: [(a.metadata||{}).lastSync||'', (b.metadata||{}).lastSync||''].sort().pop() };
  out.petInfo  = { ...d.petInfo,  ...newerObj(a.petInfo,  b.petInfo)  };
  const mfA = a.mainFood || d.mainFood, mfB = b.mainFood;
  out.mainFood = { ...d.mainFood, ...newerObj(mfA, mfB) };
  // 換糧歷史：聯集去重
  const hm = new Map();
  [...(mfA.history||[]), ...((mfB||{}).history||[])].forEach(h => {
    if(h) hm.set(h.id || (h.changedAt + '|' + h.brand + '|' + h.flavor), h);
  });
  out.mainFood.history = [...hm.values()].sort((x,y) => (x.changedAt||'') < (y.changedAt||'') ? -1 : 1);
  out.productLibrary = mergeById(a.productLibrary, b.productLibrary);
  out.feedings = mergeById(a.feedings, b.feedings);
  out.symptoms = mergeById(a.symptoms, b.symptoms);
  out.careTasks = {
    definitions: mergeById((a.careTasks||{}).definitions || d.careTasks.definitions,
                           (b.careTasks||{}).definitions),
    logs: mergeById((a.careTasks||{}).logs, (b.careTasks||{}).logs)
  };
  out.medical = mergeById(a.medical, b.medical);
  out.weights = mergeById(a.weights, b.weights);
  out.dailyChecks = mergeDailyChecks(a.dailyChecks, b.dailyChecks);
  return out;
}
// 每日檢查合併：同一天的勾選取「或」——兩人各勾各的不會互相蓋掉
function mergeDailyChecks(a = [], b = []){
  const m = new Map();
  for(const c of [...(a||[]), ...(b||[])]){
    if(!c || !c.id) continue;
    const prev = m.get(c.id);
    if(!prev){ m.set(c.id, {...c}); continue; }
    const newer = (c.updatedAt||'') >= (prev.updatedAt||'') ? c : prev;
    m.set(c.id, {...newer,
      food: !!(prev.food || c.food),
      pee:  !!(prev.pee  || c.pee),
      poop: !!(prev.poop || c.poop)});
  }
  return [...m.values()];
}

// ---------------------------------------------------------------- helpers on data
function me(){ return device.user || ''; }
function productById(id){ return (data.productLibrary || []).find(p => p.id === id); }
function productLabel(p){
  if(!p) return '（未知產品）';
  const t = `${p.brand || ''} ${p.flavor || ''}`.trim();
  return t || (p.photo ? '📷 未命名產品' : '（未命名）');
}
function latestWeight(){
  const ws = alive(data.weights).sort((a,b) => (a.date < b.date ? -1 : 1));
  return ws.length ? ws[ws.length - 1] : null;
}
function lastCareLog(taskId){
  const logs = alive(data.careTasks.logs).filter(l => l.taskId === taskId)
    .sort((a,b) => (a.timestamp < b.timestamp ? -1 : 1));
  return logs.length ? logs[logs.length - 1] : null;
}
function careStatus(def){
  const last = lastCareLog(def.id);
  if(!last) return { days:null, cls:'', txt:'尚未記錄' };
  const days = daysSince(last.timestamp);
  const ratio = days / def.cycleDays;
  const cls = ratio >= 1 ? 'due' : (ratio >= 0.66 ? 'warn' : 'ok');
  return { days, cls, txt:`已 ${days} 天` };
}
function symptomText(s){
  let t = SYMPTOM_TYPES[s.type] || s.type;
  if(s.type === 'vomit' && s.vomitContent) t += `（${VOMIT_CONTENTS[s.vomitContent] || s.vomitContent}）`;
  if(s.type === 'urine' && s.urineContent) t += `（${URINE_CONTENTS[s.urineContent] || s.urineContent}）`;
  return t;
}
function todayCheck(){
  return (data.dailyChecks || []).find(c => c.date === todayInput());
}
function toggleDailyCheck(key){
  const t = todayInput();
  data.dailyChecks = data.dailyChecks || [];
  let c = data.dailyChecks.find(x => x.date === t);
  if(!c){
    c = { id:'dc-' + t, date:t, food:false, pee:false, poop:false, recordedBy:me(), updatedAt:nowISO() };
    data.dailyChecks.push(c);
  }
  c[key] = !c[key];
  c.recordedBy = me();
  c.updatedAt = nowISO();
  saveData();
}
function dailyStreak(){
  const m = new Map((data.dailyChecks || []).map(c => [c.date, c]));
  const full = c => c && c.food && c.pee && c.poop;
  const p = n => String(n).padStart(2,'0');
  const key = d => `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
  let streak = 0;
  const d = new Date();
  if(!full(m.get(key(d)))) d.setDate(d.getDate() - 1);   // 今天還沒勾完就從昨天往回算
  while(full(m.get(key(d)))){ streak++; d.setDate(d.getDate() - 1); }
  return streak;
}
function nextMedicalDue(){
  const today = todayInput();
  const list = alive(data.medical).filter(m => m.nextDue)
    .sort((a,b) => (a.nextDue < b.nextDue ? -1 : 1));
  // 先找未來最近的；沒有未來的就顯示最近已逾期的
  const future = list.filter(m => m.nextDue >= today);
  if(future.length) return future[0];
  return list.length ? list[list.length - 1] : null;
}

}

function setHistoryFilter(f){ historyFilter = f; render(); }

function buildHistoryItems(){
  const items = [];
  for(const f of alive(data.feedings)){
    const p = productById(f.productId);
    const isTreat = p && p.category === 'treat';
    items.push({
      id:f.id, src:'feedings', ts:f.timestamp, cat:isTreat ? 'treat' : 'can',
      tag:isTreat ? '<span class="tag treat">零食</span>' : '<span class="tag">罐頭</span>',
      title:esc(productLabel(p)) + (f.rating ? '｜' + RATINGS[f.rating] : ''),
      sub:[fmtDT(f.timestamp), f.replacedLastMeal ? '取代最後一餐' : '', f.notes, f.recordedBy && `by ${f.recordedBy}`].filter(Boolean).join('｜')
    });
  }
  for(const s of alive(data.symptoms)){
    items.push({
      id:s.id, src:'symptoms', ts:s.timestamp, cat:'symptom',
      tag:'<span class="tag sym">症狀</span>',
      title:esc(symptomText(s)) + ` <span class="sev ${s.severity}">${SEVERITIES[s.severity] || ''}</span>`,
      sub:[fmtDT(s.timestamp), s.notes, s.recordedBy && `by ${s.recordedBy}`].filter(Boolean).join('｜')
    });
  }
  for(const l of alive(data.careTasks.logs)){
    const def = (data.careTasks.definitions || []).find(d => d.id === l.taskId);
    items.push({
      id:l.id, src:'careLogs', ts:l.timestamp, cat:'care',
      tag:'<span class="tag care">照護</span>',
      title:esc(def ? def.name : l.taskId),
      sub:[fmtDT(l.timestamp), l.notes, l.recordedBy && `by ${l.recordedBy}`].filter(Boolean).join('｜')
    });
  }
  for(const m of alive(data.medical)){
    const labs = Object.entries(m.labValues || {}).map(([k,v]) => `${k}: ${v}`).join('、');
    items.push({
      id:m.id, src:'medical', ts:m.date, cat:'medical',
      tag:'<span class="tag med">醫療</span>',
      title:esc(m.reason || '就診'),
      sub:[fmtDate(m.date), m.clinic, m.diagnosis && `診斷：${m.diagnosis}`, m.treatment && `處置：${m.treatment}`,
           labs, m.cost != null && m.cost !== '' && `費用 $${m.cost}`,
           m.nextDue && `下次：${fmtDate(m.nextDue)}`, m.recordedBy && `by ${m.recordedBy}`].filter(Boolean).join('\n')
    });
  }
  for(const w of alive(data.weights)){
    items.push({
      id:w.id, src:'weights', ts:w.date, cat:'weight',
      tag:'<span class="tag wt">體重</span>',
      title:`${w.kg} kg`,
      sub:[fmtDate(w.date), w.recordedBy && `by ${w.recordedBy}`].filter(Boolean).join('｜')
    });
  }
  for(const h of (data.mainFood.history || [])){
    items.push({
      id:h.id || h.changedAt, src:'foodHistory', ts:h.changedAt, cat:'can',
      tag:'<span class="tag">主食</span>',
      title:`換糧：${esc(h.brand)} ${esc(h.flavor)}`,
      sub:fmtDate(h.changedAt)
    });
  }
  return items.sort((a,b) => (a.ts > b.ts ? -1 : 1));
}

function deleteRecord(src, id){
  if(!confirm('確定要刪除這筆紀錄嗎？')) return;
  const mark = arr => {
    const it = (arr || []).find(x => x.id === id);
    if(it){ it.deleted = true; it.updatedAt = nowISO(); }
  };
  if(src === 'feedings') mark(data.feedings);
  else if(src === 'symptoms') mark(data.symptoms);
  else if(src === 'careLogs') mark(data.careTasks.logs);
  else if(src === 'medical') mark(data.medical);
  else if(src === 'weights') mark(data.weights);
  else if(src === 'foodHistory'){
    data.mainFood.history = (data.mainFood.history || []).filter(h => (h.id || h.changedAt) !== id);
    data.mainFood.updatedAt = nowISO();
  }
  saveData();
  toast('已刪除');
}

async function drivePhotosFolder(){
  if(device.photosFolderId) return device.photosFolderId;
  const q = encodeURIComponent(`'${device.folderId}' in parents and name='${PHOTOS_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const resp = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)&supportsAllDrives=true&includeItemsFromAllDrives=true`);
  const json = await resp.json();
  let id = json.files && json.files[0] && json.files[0].id;
  if(!id){
    const r2 = await driveFetch('https://www.googleapis.com/drive/v3/files?supportsAllDrives=true', {
      method:'POST', headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ name:PHOTOS_FOLDER_NAME, mimeType:'application/vnd.google-apps.folder', parents:[device.folderId] })
    });
    id = (await r2.json()).id;
  }
  device.photosFolderId = id;
  saveDevice();
  return id;
}
async function uploadPhotos(input){
  const files = [...(input.files || [])];
  if(!files.length) return;
  const status = $('#albumStatus');
  try{
    const folderId = await drivePhotosFolder();
    for(let i = 0; i < files.length; i++){
      if(status) status.textContent = `上傳中 ${i + 1}/${files.length}…（原圖，請稍候）`;
      const f = files[i];
      const boundary = 'codyapp' + Math.random().toString(36).slice(2);
      const meta = { name:`${Date.now()}-${f.name || 'photo.jpg'}`, parents:[folderId] };
      const body = new Blob([
        `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: ${f.type || 'image/jpeg'}\r\n\r\n`,
        f,
        `\r\n--${boundary}--`
      ]);
      await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true', {
        method:'POST', headers:{ 'Content-Type':`multipart/related; boundary=${boundary}` }, body
      });
    }
    input.value = '';
    toast(`已上傳 ${files.length} 張照片 ☁️`);
    loadAlbum();
  }catch(e){
    if(status) status.textContent = '❌ 上傳失敗：' + e.message;
  }
}
async function loadAlbum(){
  const grid = $('#albumGrid'), status = $('#albumStatus');
  if(!grid) return;
  if(!device.folderId){ if(status) status.textContent = '尚未設定共用資料夾'; return; }
  try{
    const folderId = await drivePhotosFolder();
    const q = encodeURIComponent(`'${folderId}' in parents and trashed=false and mimeType contains 'image/'`);
    const resp = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,thumbnailLink,createdTime)&orderBy=createdTime desc&pageSize=100&supportsAllDrives=true&includeItemsFromAllDrives=true`);
    const files = (await resp.json()).files || [];
    if(status) status.textContent = files.length ? `共 ${files.length} 張` : '還沒有照片，按上面的按鈕上傳第一張吧';
    grid.innerHTML = files.map(f =>
      `<button class="album-thumb" onclick="openPhotoView('${f.id}')">
        ${f.thumbnailLink ? `<img src="${esc(f.thumbnailLink.replace('=s220', '=s400'))}" loading="lazy" alt="">` : '📷'}
      </button>`).join('');
  }catch(e){
    if(status) status.textContent = '看相簿需要先登入 Drive：到「設定」按「登入並同步」後再回來';
  }
}
async function openPhotoView(fileId){
  openModal(`${modalHead('📷 照片')}
    <div id="photoViewBox" class="empty">載入原圖中…</div>
    <button class="btn small danger" onclick="deletePhoto('${fileId}')">🗑️ 刪除這張照片</button>`);
  try{
    const resp = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&supportsAllDrives=true`);
    const url = URL.createObjectURL(await resp.blob());
    const box = $('#photoViewBox');
    if(box) box.outerHTML = `<img src="${url}" style="width:100%;border-radius:12px" alt="">`;
  }catch(e){
    const box = $('#photoViewBox');
    if(box) box.textContent = '❌ ' + e.message;
  }
}
async function deletePhoto(fileId){
  if(!confirm('確定刪除這張照片？（會從 Drive 移除，兩人都看不到）')) return;
  try{
    await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?supportsAllDrives=true`, { method:'DELETE' });
    closeModal();
    toast('已刪除');
    loadAlbum();
  }catch(e){
    alert('刪除失敗：' + e.message);
  }
}

function setUser(u){ device.user = u; saveDevice(); render(); toast(`記錄者：${u}`); }

function savePetInfo(){
  data.petInfo.name = $('#petName').value.trim() || 'Cody';
  data.petInfo.birthDate = $('#petBirth').value || '2024-02-26';
  data.petInfo.breed = $('#petBreed').value.trim();
  data.petInfo.updatedAt = nowISO();
  saveData();
  toast('已儲存寵物資料');
}
function openPetPhoto(){
  if(currentView !== 'settings'){ currentView = 'settings'; render(); }
  setTimeout(() => { const el = $('#petPhotoInput'); if(el) el.click(); }, 50);
}
function handlePetPhoto(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const img = new Image();
  img.onload = () => {
    const size = 300;
    const canvas = document.createElement('canvas');
    const scale = Math.max(size / img.width, size / img.height);
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const w = img.width * scale, h = img.height * scale;
    ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
    data.petInfo.photoUrl = canvas.toDataURL('image/jpeg', 0.85);
    data.petInfo.updatedAt = nowISO();
    saveData();
    toast('大頭照已更新');
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(file);
}

function saveMainFood(){
  const brand = $('#mfBrand').value.trim();
  const flavor = $('#mfFlavor').value.trim();
  const meals = parseInt($('#mfMeals').value, 10) || 6;
  const changed = brand !== data.mainFood.brand || flavor !== data.mainFood.flavor;
  data.mainFood.brand = brand;
  data.mainFood.flavor = flavor;
  data.mainFood.mealsPerDay = meals;
  data.mainFood.updatedAt = nowISO();
  if(changed && (brand || flavor)){
    data.mainFood.history = data.mainFood.history || [];
    data.mainFood.history.push({ id: uid(), brand, flavor, changedAt: nowISO() });
  }
  saveData();
  toast(changed ? '已更新主食（已記錄換糧事件）' : '已儲存主食設定');
}

function updateCareDef(id, key, val){
  const d = (data.careTasks.definitions || []).find(x => x.id === id);
  if(!d) return;
  if(key === 'cycleDays') d.cycleDays = Math.max(1, parseInt(val, 10) || 1);
  else d.name = val.trim() || d.name;
  d.updatedAt = nowISO();
  saveData({ rerender:false });
}
function addCareDef(){
  const name = prompt('新照護項目名稱（如：梳毛、剃毛）');
  if(!name) return;
  const cycle = parseInt(prompt('提醒週期（天）', '7'), 10) || 7;
  data.careTasks.definitions.push({ id: uid(), name: name.trim(), cycleDays: cycle, updatedAt: nowISO() });
  saveData();
  toast('已新增照護項目');
}
function deleteCareDef(id){
  const d = (data.careTasks.definitions || []).find(x => x.id === id);
  if(!d) return;
  if(!confirm(`確定刪除照護項目「${d.name}」？（歷史紀錄仍會保留）`)) return;
  d.deleted = true;
  d.updatedAt = nowISO();
  saveData();
}

// ---------------------------------------------------------------- export / import
function exportJSON(){
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  const d = new Date(), p = n => String(n).padStart(2,'0');
  a.href = URL.createObjectURL(blob);
  a.download = `cody-data-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('已匯出備份');
}
function importJSON(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const incoming = JSON.parse(reader.result);
      data = mergeData(data, incoming);
      saveData();
      toast('已匯入並合併資料');
    }catch(e){
      alert('匯入失敗：檔案不是有效的 JSON');
    }
    input.value = '';
  };
  reader.readAsText(file);
}
function resetAll(){
  if(!confirm('確定要清除這台裝置上的所有資料嗎？（Drive 上的資料不受影響）')) return;
  localStorage.removeItem(LS_KEY);
  data = defaultData();
  saveData({ sync:false });
  toast('已清除本機資料');
}

// ============================ Modal 系統 ============================
function openModal(html){
  $('#modalBox').innerHTML = html;
  $('#modalBack').classList.add('show');
}
function closeModal(){
  $('#modalBack').classList.remove('show');
  $('#modalBox').innerHTML = '';
}
$('#modalBack') && document.addEventListener('click', e => {
  if(e.target === $('#modalBack')) closeModal();
});
function modalHead(title){
  return `<h3>${title}<button class="x" onclick="closeModal()">✕</button></h3>`;
}
function chipGroupHtml(name, options, selected, multi = false){
  return `<div class="chips" data-chips="${name}" data-multi="${multi ? 1 : 0}">
    ${Object.entries(options).map(([k,l]) =>
      `<button type="button" class="chip ${ (multi ? (selected||[]).includes(k) : selected === k) ? 'on' : ''}"
        data-val="${k}" onclick="toggleChip(this)">${l}</button>`).join('')}
  </div>`;
}
function toggleChip(btn){
  const group = btn.closest('[data-chips]');
  const multi = group.dataset.multi === '1';
  if(multi){
    btn.classList.toggle('on');
  }else{
    group.querySelectorAll('[data-val]').forEach(c => c.classList.remove('on'));
    btn.classList.add('on');
  }
  if(group.dataset.chips === 'symType'){
    const v = chipValue('symType');
    const vomitBox = $('#vomitContentBox');
    if(vomitBox) vomitBox.style.display = v === 'vomit' ? 'block' : 'none';
    const urineBox = $('#urineContentBox');
    if(urineBox) urineBox.style.display = v === 'urine' ? 'block' : 'none';
  }
}
function chipValue(name){
  const group = document.querySelector(`[data-chips="${name}"]`);
  if(!group) return null;
  if(group.dataset.multi === '1')
    return [...group.querySelectorAll('[data-val].on')].map(c => c.dataset.val);
  const on = group.querySelector('[data-val].on');
  return on ? on.dataset.val : null;
}

function fileToResizedDataURL(file, maxSize, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(img.src);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

    Chart.defaults.color = tickCol;

             x:{ grid:{ display:false }, ticks:{ color:tickCol } } }

}

function labSeries(){
  const meds = alive(data.medical).sort((a,b) => (a.date < b.date ? -1 : 1));
  const series = {};
  for(const m of meds){
    for(const [k,v] of Object.entries(m.labValues || {})){
      if(typeof v !== 'number' || isNaN(v)) continue;
      (series[k] = series[k] || []).push({ date:m.date, value:v });
    }
  }
  return series;
}
function renderLabCharts(){
  const holder = document.getElementById('labChartsHolder');
  if(!holder) return;
  const series = labSeries();
  const keys = Object.keys(series).filter(k => series[k].length >= 2);
  if(!keys.length){ holder.innerHTML = ''; return; }
  const labCol = '#8C8378', gridCol = '#EAE3D9';
  holder.innerHTML = `<h2>檢驗指數趨勢</h2>` + keys.map((k,i) =>
    `<div class="card" style="margin-bottom:10px"><span style="font-size:14px;font-weight:500">${esc(k)}</span>
     <div class="lab-chart"><canvas id="labChart_${i}"></canvas></div></div>`).join('');
  keys.forEach((k,i) => {
    const el = document.getElementById(`labChart_${i}`);
    charts.push(new Chart(el, {
      type:'line',
      data:{
        labels: series[k].map(p => fmtShortDate(p.date)),
        datasets:[{ data: series[k].map(p => p.value), borderColor: labCol,
          backgroundColor:'rgba(140,131,120,.10)', fill:true, tension:.25, borderWidth:2,
          pointRadius:3, pointBackgroundColor: labCol }]
      },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false } },
        scales:{ y:{ grid:{ color:gridCol }, ticks:{ color:labCol } }, x:{ grid:{ display:false }, ticks:{ color:labCol } } } }
    }));
  });
}

// ============================ Google Drive 同步 ============================
let accessToken = null;
let tokenExpiry = 0;
let syncTimer = null;
let syncing = false;

function syncStatusText(){
  if(syncing) return '同步中…';
  if(!device.clientId || !device.folderId) return '尚未設定（填入 Client ID 與資料夾 ID）';
  if(accessToken && Date.now() < tokenExpiry) return `✅ 已連接${data.metadata.lastSync ? `｜上次同步 ${fmtDT(data.metadata.lastSync)}` : ''}`;
  return data.metadata.lastSync ? `未登入｜上次同步 ${fmtDT(data.metadata.lastSync)}` : '未登入';
}
function setSyncStatus(text, cls){
  const el = document.getElementById('syncStatus');
  if(el){ el.textContent = text; el.className = 'sync-status ' + (cls || ''); }
}
function saveDriveSettings(){
  device.clientId = $('#gClientId').value.trim();
  device.folderId = $('#gFolderId').value.trim();
  saveDevice();
  toast('已儲存同步設定');
  setSyncStatus(syncStatusText());
}
function getAccessToken(){
  return new Promise((resolve, reject) => {
    if(accessToken && Date.now() < tokenExpiry - 60000) return resolve(accessToken);
    if(!window.google || !google.accounts || !google.accounts.oauth2)
      return reject(new Error('Google 登入元件尚未載入，請檢查網路後重試'));
    if(!device.clientId) return reject(new Error('尚未設定 OAuth Client ID'));
    const tc = google.accounts.oauth2.initTokenClient({
      client_id: device.clientId,
      scope: 'https://www.googleapis.com/auth/drive',
      callback: resp => {
        if(resp && resp.access_token){
          accessToken = resp.access_token;
          tokenExpiry = Date.now() + (parseInt(resp.expires_in, 10) || 3600) * 1000;
          resolve(accessToken);
        }else{
          reject(new Error('取得授權失敗'));
        }
      },
      error_callback: err => reject(new Error(err && err.message ? err.message : '登入視窗被關閉或發生錯誤'))
    });
    tc.requestAccessToken({ prompt: '' });
  });
}
async function driveFetch(url, opts = {}){
  const token = await getAccessToken();
  const resp = await fetch(url, {
    ...opts,
    headers: { ...(opts.headers || {}), 'Authorization': `Bearer ${token}` }
  });
  if(resp.status === 401){
    accessToken = null;
    throw new Error('授權過期，請再按一次「登入並同步」');
  }
  if(!resp.ok){
    const body = await resp.text();
    throw new Error(`Drive API 錯誤 ${resp.status}：${body.slice(0, 200)}`);
  }
  return resp;
}
async function driveFindFile(){
  const q = encodeURIComponent(`'${device.folderId}' in parents and name='${DATA_FILENAME}' and trashed=false`);
  const resp = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&supportsAllDrives=true&includeItemsFromAllDrives=true`);
  const json = await resp.json();
  return (json.files && json.files[0]) || null;
}
async function driveDownload(fileId){
  const resp = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&supportsAllDrives=true`);
  return resp.json();
}
async function driveCreate(content){
  const boundary = 'codyapp' + Date.now();
  const meta = { name: DATA_FILENAME, parents: [device.folderId], mimeType: 'application/json' };
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n` +
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${boundary}--`;
  await driveFetch(`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true`, {
    method: 'POST',
    headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
    body
  });
}
async function driveUpdate(fileId, content){
  await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media&supportsAllDrives=true`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: content
  });
}
async function syncNow(){
  if(syncing) return;
  if(!device.clientId || !device.folderId){
    setSyncStatus('請先填入 Client ID 與共用資料夾 ID', 'err');
    return;
  }
  syncing = true;
  setSyncStatus('同步中…');
  try{
    const file = await driveFindFile();
    if(file){
      const remote = await driveDownload(file.id);
      data = mergeData(data, remote);
      data.metadata.lastSync = nowISO();
      await driveUpdate(file.id, JSON.stringify(data, null, 2));
    }else{
      data.metadata.lastSync = nowISO();
      await driveCreate(JSON.stringify(data, null, 2));
    }
    localStorage.setItem(LS_KEY, JSON.stringify(data));
    syncing = false;
    render();
    setSyncStatus(`✅ 同步完成 ${fmtDT(data.metadata.lastSync)}`, 'ok');
    toast('☁️ 已同步 Google Drive');
  }catch(e){
    syncing = false;
    console.error(e);
    setSyncStatus('❌ ' + e.message, 'err');
  }
}
function connectAndSync(){
  saveDriveSettings();
  syncNow();
}
// 存檔後若已登入，延遲自動同步（離線或未登入則略過，不影響本機記錄）
function scheduleSync(){
  if(!accessToken || Date.now() >= tokenExpiry) return;
  if(!navigator.onLine) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => syncNow(), 4000);
}
window.addEventListener('online', () => scheduleSync());

document.querySelectorAll('#tabs button').forEach(b => {
  b.addEventListener('click', () => { currentView = b.dataset.v; render(); });
});
